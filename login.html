<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login - All India BOCW Forum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login - All India BOCW Forum">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sumoselect@3.4.9/sumoselect.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body data-page="login">
  <div id="spinner" class="show">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
  </div>

  <div class="container-fluid topbar d-none d-lg-block">
    <div class="container-fluid">
      <div class="row topbar-inner align-items-center">
        <div class="col-md-4 mt-3 text-start topbar-logos">
          <img src="assets/BOCW/lion.png" alt="Lion Emblem">
          <img src="assets/BOCW/mygov.jpg" alt="MyGov">
          <img src="assets/BOCW/mygovsym.png" alt="MyGov Symbol">
        </div>
        <div class="col-md-7 mt-4 text-center">
          <h2 class="topbar-title">All India BOCW Forum</h2>
        </div>
        <div class="col-md-1 mt-4 text-center">
          <a href="login.html">Login</a>
        </div>
      </div>
    </div>
  </div>

  <div class="container-fluid main-navbar">
    <nav class="navbar navbar-expand-lg p-0">
      <div class="container-fluid">
        <button class="navbar-toggler my-1" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
          <div class="navbar-nav mx-lg-auto">
            <span class="nav-filler"></span><span class="nav-filler"></span><span class="nav-filler"></span><span class="nav-filler"></span><span class="nav-filler"></span><span class="nav-filler"></span><span class="nav-filler"></span><span class="nav-filler"></span><span class="nav-filler"></span>
            <a class="nav-link" data-page="home" href="index.html">Home</a>
            <a class="nav-link" data-page="about" href="about.html">About</a>
            <a class="nav-link" data-page="discussion" href="discussion.html">Discussion</a>
            <a class="nav-link" data-page="resources" href="resources.html">Resources</a>
            <a class="nav-link" data-page="officers" href="officers.html">Officers</a>
            <a class="nav-link" data-page="gallery" href="gallery.html">Gallery</a>
          </div>
        </div>
      </div>
    </nav>
  </div>

  <div class="container-fluid hero-wrap">
    <div class="container mt-1 pt-3 pb-4">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
          <div class="card shadow-sm">
            <div class="card-header text-white" style="background-color:#63698d;">
              <h5 class="mb-0">BOCW Forum Login</h5>
            </div>
            <div class="card-body">
              <form id="loginForm">
                <div class="mb-3">
                  <label for="username" class="form-label">Username / Email</label>
                  <input type="text" class="form-control" id="username" placeholder="Enter your username">
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input type="password" class="form-control" id="password" placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-find w-100">Login</button>
                <p class="text-center text-muted mt-2 mb-0" style="font-size:12px;">Authorized personnel only</p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <div class="row">
        <div class="col-md-3 text-start mb-2 mb-md-0">Contact: +91 99999 99999</div>
        <div class="col-md-3 text-start mb-2 mb-md-0"><a href="mailto:info@BOCW.gov.in">info@BOCW.gov.in</a></div>
        <div class="col-md-6 text-md-end">Building And Other Construction Workers Welfare Board (all rights reserved)</div>
      </div>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sumoselect@3.4.9/jquery.sumoselect.min.js"></script>
  <script src="app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function (event) {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) {
        alert('Please enter username and password');
        return;
      }
      alert('Login functionality requires server integration. This is a static replica.');
    });
  </script>
</body>
</html>
